    <h1 class="text-center mt-5">Form Pemesanan Kebab</h1>
    <p class="text-center mb-4">Silakan isi form berikut untuk melakukan pemesanan kebab. Kami akan segera memproses pesanan Anda setelah Anda mengirimkannya.</p>
    
    <form action="thanks.html" method="get" class="ms-5 me-5 mb-5 p-5 rounded-4 shadow-lg bg-body-tertiary">
        <div class="mb-3">
            <label for="nama" class="form-label"><i class="bi bi-person-fill"></i> Nama Lengkap</label> <br>
            <input type="text" id="nama" name="nama"  class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="alamat" class="form-label"><i class="bi bi-geo-alt-fill"></i> Alamat</label> <br>
            <textarea type="text" id="alamat" name="alamat" class="form-control" required></textarea>
        </div>
        
        <div class="mb-3">
            <label for="telepon" class="form-label"><i class="bi bi-telephone-fill"></i> Nomor Telepon</label> <br>
            <input type="tel" id="telepon" name="telepon" class="form-control" pattern="08[0-9]{8,11}" placeholder="08xxxxxxxxxx" required>
        </div>

        <div class="mb-3">
            <label for="jumlah-pesanan" class="form-label">Jumlah Pesanan</label> <br>
            <input type="number" id="jumlah" name="jumlah" min="1" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="metode-bayar" class="form-label"><i class="bi bi-cash-stack"></i> Metode Pembayaran</label> <br>
            <select id="metode-bayar" name="metode-bayar" class="form-select">
                <option value="cash">Cash</option>
                <option value="transfer">E-Wallet/Transfer</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label for="catatan" class="form-label">Catatan Tambahan</label> <br>
            <textarea type="text" id="catatan" name="catatan" class="form-control"></textarea>
        </div>

        <button type="submit" class="btn btn-danger">Pesan</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
