<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan Kebab</title>
    <link rel="icon" type="image/png" href="src/logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <form action="thanks.html" method="get">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required><br><br>

        <label for="alamat">Alamat:</label>
        <input type="text" id="alamat" name="alamat" required><br><br>

        <label for="telepon">Nomor Telepon:</label>
        <input type="tel" id="telepon" name="telepon" required><br><br>

        <label for="jumlah-pesanan">Jumlah Pesanan:</label>
        <input type="number" id="jumlah" name="jumlah" min="1" required><br><br>

        <label for="metode-bayar">Metode Pembayaran:</label>
        <select id="metode-bayar" name="metode-bayar">
            <option value="cash">Cash</option>
            <option value="transfer">Transfer Bank</option>
        </select><br><br>
        <button type="submit">Pesan</button>
    </form>
</body>
</html>
